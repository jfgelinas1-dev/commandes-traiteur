<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Commandes Traiteur</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; color: #1a1a1a; min-height: 100vh; }
  .topbar { background: #fff; border-bottom: 1px solid #e5e5e0; padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; position: sticky; top: 0; z-index: 10; }
  .topbar-title { font-size: 17px; font-weight: 600; }
  .topbar-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .badge { font-size: 12px; padding: 4px 10px; border-radius: 20px; font-weight: 500; }
  .badge-green { background: #e6f4ea; color: #1e7e34; }
  .badge-blue { background: #e8f0fe; color: #1a56db; }
  .badge-red { background: #fce8e8; color: #c0392b; }
  .badge-gray { background: #f0f0f0; color: #666; }
  .container { max-width: 900px; margin: 0 auto; padding: 20px 16px; }
  .config-card { background: #fff; border-radius: 12px; border: 1px solid #e5e5e0; padding: 16px 18px; margin-bottom: 20px; }
  .config-title { font-size: 13px; font-weight: 600; color: #666; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; }
  .config-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
  .config-row:last-child { margin-bottom: 0; }
  .config-label { font-size: 13px; color: #666; width: 100px; flex-shrink: 0; }
  .config-input { flex: 1; min-width: 200px; font-size: 14px; padding: 8px 12px; border-radius: 8px; border: 1px solid #ddd; background: #fafafa; color: #1a1a1a; outline: none; }
  .config-input:focus { border-color: #1a56db; background: #fff; }
  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-top: 4px; }
  .btn { cursor: pointer; font-size: 14px; font-weight: 500; padding: 9px 18px; border-radius: 8px; border: none; transition: opacity 0.15s; }
  .btn:hover { opacity: 0.85; }
  .btn-primary { background: #1a56db; color: #fff; }
  .btn-green { background: #1e7e34; color: #fff; }
  .auto-toggle { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #666; cursor: pointer; }
  .toggle { width: 36px; height: 20px; background: #ccc; border-radius: 10px; position: relative; transition: background 0.2s; flex-shrink: 0; }
  .toggle.on { background: #1a56db; }
  .toggle::after { content:''; position:absolute; width:16px; height:16px; background:#fff; border-radius:50%; top:2px; left:2px; transition: left 0.2s; }
  .toggle.on::after { left:18px; }
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .stat-card { background: #fff; border-radius: 10px; border: 1px solid #e5e5e0; padding: 14px 16px; }
  .stat-label { font-size: 12px; color: #888; margin-bottom: 4px; }
  .stat-value { font-size: 26px; font-weight: 600; color: #1a1a1a; }
  .stat-sub { font-size: 12px; color: #aaa; margin-top: 2px; }
  .section-title { font-size: 12px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 12px; }
  .plats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .plat-card { background: #fff; border-radius: 12px; border: 1px solid #e5e5e0; padding: 14px 16px; }
  .plat-name { font-size: 13px; font-weight: 600; color: #1a1a1a; margin-bottom: 10px; line-height: 1.35; }
  .plat-row { display: flex; justify-content: space-between; font-size: 12px; color: #888; margin-bottom: 4px; }
  .plat-count { font-weight: 600; color: #1a1a1a; }
  .plat-total-row { display: flex; justify-content: space-between; font-size: 14px; font-weight: 600; color: #1a1a1a; margin-top: 8px; padding-top: 8px; border-top: 1px solid #f0f0f0; }
  .plat-bar-bg { height: 5px; background: #f0f0ee; border-radius: 3px; margin-top: 10px; }
  .plat-bar { height: 5px; background: #1a56db; border-radius: 3px; transition: width 0.5s ease; }
  .last-update { font-size: 12px; color: #aaa; text-align: right; margin-bottom: 20px; }
  .error-box { background: #fce8e8; border: 1px solid #f5c6c6; border-radius: 10px; padding: 14px 16px; color: #c0392b; font-size: 14px; margin-bottom: 16px; display: none; }
  .debug-toggle { font-size: 12px; color: #aaa; cursor: pointer; text-decoration: underline; margin-bottom: 8px; display: none; }
  .debug-box { background: #f8f8f0; border: 1px solid #e0e0c8; border-radius: 10px; padding: 12px 14px; font-size: 11px; color: #555; margin-bottom: 16px; font-family: monospace; white-space: pre-wrap; max-height: 300px; overflow-y: auto; display: none; }
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #ccc; border-top-color: #1a56db; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty-state { text-align: center; padding: 40px 20px; color: #aaa; font-size: 15px; }
  @media (max-width: 480px) { .plats-grid { grid-template-columns: 1fr 1fr; } .stats-grid { grid-template-columns: 1fr 1fr; } }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">🍽️ Commandes Traiteur</div>
  <div class="topbar-right">
    <span class="badge badge-gray" id="status-badge">En attente</span>
    <span id="countdown-label" style="font-size:12px;color:#888;display:none;"></span>
  </div>
</div>

<div class="container">
  <div class="config-card">
    <div class="config-title">Configuration</div>
    <div class="config-row">
      <span class="config-label">ID formulaire</span>
      <input class="config-input" id="form-id" type="text" value="260972615393262" placeholder="ex: 260972615393262" />
    </div>
    <div class="config-row">
      <span class="config-label">Clé API</span>
      <input class="config-input" id="api-key" type="text" value="0a1ac512dab909b238315a442fa2f5f1" placeholder="Clé API JotForm" />
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="fetchData()">⟳ Rafraîchir maintenant</button>
      <button class="btn btn-green" id="dl-btn" onclick="downloadExcel()" style="display:none;">↓ Télécharger Excel</button>
      <div class="auto-toggle" onclick="toggleAuto()">
        <div class="toggle on" id="auto-toggle"></div>
        <span id="auto-label">Rafraîchissement auto (1h)</span>
      </div>
    </div>
  </div>

  <div class="error-box" id="error-box"></div>
  <a class="debug-toggle" id="debug-toggle" onclick="toggleDebug()">Afficher le diagnostic</a>
  <div class="debug-box" id="debug-box"></div>

  <div id="main-content">
    <div class="empty-state">Clique sur Rafraîchir pour charger les commandes</div>
  </div>
</div>

<script>
const PRICES = { ti:9,tf:33.5,si:9,sf:33.5,pi:9,pf:33.5,fi:9,ff:33.5,sauce:7.5,pizza:8.75,poke:12,salade:9.5,potage:5.5,quiche:10,baguette:7,muffin:5 };

const PLATS_DEF = [
  { label:'Tournedos de poulet', items:[{k:'ti',l:'Individuel'},{k:'tf',l:'Familial'}] },
  { label:'Sauté de boeuf', items:[{k:'si',l:'Individuel'},{k:'sf',l:'Familial'}] },
  { label:'Porc aux tomates', items:[{k:'pi',l:'Individuel'},{k:'pf',l:'Familial'}] },
  { label:'Fusilli pizza', items:[{k:'fi',l:'Individuel'},{k:'ff',l:'Familial'}] },
  { label:'Sauce spaghetti', items:[{k:'sauce',l:''}] },
  { label:'Pizza-ghetti', items:[{k:'pizza',l:''}] },
  { label:'Poke au goberge', items:[{k:'poke',l:''}] },
  { label:'Salade big mac', items:[{k:'salade',l:''}] },
  { label:'Potage détox', items:[{k:'potage',l:''}] },
  { label:'Quiche', items:[{k:'quiche',l:''}] },
  { label:'Baguette', items:[{k:'baguette',l:''}] },
  { label:'Muffins double choco (6)', items:[{k:'muffin',l:''}] },
];

let allSubmissions = [];
let debugLog = '';
let autoOn = true, autoInterval = null, countdownInterval = null, nextRefresh = null;

window.onload = () => fetchData();

function toggleAuto() {
  autoOn = !autoOn;
  document.getElementById('auto-toggle').className = 'toggle' + (autoOn ? ' on' : '');
  document.getElementById('auto-label').textContent = autoOn ? 'Rafraîchissement auto (1h)' : 'Auto désactivé';
  if (autoOn) startAutoRefresh();
  else { clearInterval(autoInterval); clearInterval(countdownInterval); document.getElementById('countdown-label').style.display = 'none'; }
}

function startAutoRefresh() {
  clearInterval(autoInterval); clearInterval(countdownInterval);
  nextRefresh = Date.now() + 3600000;
  autoInterval = setInterval(fetchData, 3600000);
  const lbl = document.getElementById('countdown-label');
  lbl.style.display = '';
  countdownInterval = setInterval(() => {
    const d = Math.max(0, nextRefresh - Date.now());
    lbl.textContent = `Prochain: ${Math.floor(d/60000)}m${Math.floor((d%60000)/1000).toString().padStart(2,'0')}s`;
  }, 1000);
}

function setStatus(text, type) {
  const b = document.getElementById('status-badge');
  b.textContent = text;
  b.className = 'badge badge-' + (type || 'gray');
}

function showError(msg) {
  const b = document.getElementById('error-box');
  b.textContent = '⚠ ' + msg;
  b.style.display = '';
  setStatus('Erreur', 'red');
}

function toggleDebug() {
  const box = document.getElementById('debug-box');
  const lnk = document.getElementById('debug-toggle');
  const showing = box.style.display === 'block';
  box.style.display = showing ? 'none' : 'block';
  if (!showing) box.textContent = debugLog;
  lnk.textContent = showing ? 'Afficher le diagnostic' : 'Masquer le diagnostic';
}

async function fetchData() {
  const formId = document.getElementById('form-id').value.trim();
  const apiKey = document.getElementById('api-key').value.trim();
  if (!formId || !apiKey) { showError('Veuillez entrer l\'ID du formulaire et la clé API.'); return; }

  document.getElementById('error-box').style.display = 'none';
  setStatus('Chargement...', 'blue');
  document.getElementById('main-content').innerHTML = '<div class="empty-state"><span class="spinner"></span>Connexion à JotForm...</div>';
  debugLog = '';

  try {
    let all = [], offset = 0;
    while (true) {
      const url = `https://api.jotform.com/form/${formId}/submissions?apiKey=${apiKey}&limit=1000&offset=${offset}&orderby=created_at,ASC`;
      const res = await fetch(url);
      const data = await res.json();
      if (data.responseCode !== 200) throw new Error(data.message || 'Erreur API code ' + data.responseCode);
      all = all.concat(data.content);
      if (data.content.length < 1000) break;
      offset += 1000;
    }

    allSubmissions = all;

    if (all.length > 0) {
      debugLog = '=== Première soumission (structure brute) ===\n';
      Object.entries(all[0].answers || {}).forEach(([qid, ans]) => {
        debugLog += `qid=${qid} | text="${(ans.text||'').substring(0,60)}" | answer=${JSON.stringify(ans.answer).substring(0,100)}\n`;
      });
      document.getElementById('debug-toggle').style.display = '';
    }

    renderDashboard(all);
    document.getElementById('dl-btn').style.display = '';
    setStatus('En ligne · ' + all.length + ' commandes', 'green');
    if (autoOn) startAutoRefresh();

  } catch(e) {
    showError(e.message);
    document.getElementById('main-content').innerHTML = '';
  }
}

function parseSub(sub) {
  const t = {ti:0,tf:0,si:0,sf:0,pi:0,pf:0,fi:0,ff:0,sauce:0,pizza:0,poke:0,salade:0,potage:0,quiche:0,baguette:0,muffin:0};

  Object.values(sub.answers || {}).forEach(ans => {
    const txt = (ans.text || ans.name || '').toLowerCase();
    const answer = ans.answer;
    if (answer === null || answer === undefined || answer === '') return;

    // CASE 1: object answer — JotForm product list {subLabel: qty}
    if (typeof answer === 'object' && !Array.isArray(answer)) {
      Object.entries(answer).forEach(([subLabel, subVal]) => {
        const qty = parseInt(subVal) || 0;
        if (!qty) return;
        const sl = subLabel.toLowerCase().trim();
        const isInd = sl.includes('individuel');
        const isFam = sl.includes('familial') || sl.includes('casserole') || sl.includes('famille');
        if (!isInd && !isFam) return;
        if      (txt.includes('tournedos'))                                                        { if(isInd) t.ti+=qty; else t.tf+=qty; }
        else if (txt.includes('sauté')||txt.includes('saute')||txt.includes('boeuf'))              { if(isInd) t.si+=qty; else t.sf+=qty; }
        else if (txt.includes('porc'))                                                             { if(isInd) t.pi+=qty; else t.pf+=qty; }
        else if (txt.includes('fusilli'))                                                          { if(isInd) t.fi+=qty; else t.ff+=qty; }
      });
      return;
    }

    // CASE 2: flat numeric answer
    const qty = parseInt(answer) || 0;
    if (!qty) return;
    if      (txt.includes('tournedos') && txt.includes('individuel'))                             t.ti += qty;
    else if (txt.includes('tournedos') && (txt.includes('familial')||txt.includes('casserole')))  t.tf += qty;
    else if ((txt.includes('sauté')||txt.includes('saute')||txt.includes('boeuf')) && txt.includes('individuel'))                            t.si += qty;
    else if ((txt.includes('sauté')||txt.includes('saute')||txt.includes('boeuf')) && (txt.includes('familial')||txt.includes('casserole'))) t.sf += qty;
    else if (txt.includes('porc') && txt.includes('individuel'))                                  t.pi += qty;
    else if (txt.includes('porc') && (txt.includes('familial')||txt.includes('casserole')))       t.pf += qty;
    else if (txt.includes('fusilli') && txt.includes('individuel'))                               t.fi += qty;
    else if (txt.includes('fusilli') && (txt.includes('familial')||txt.includes('casserole')))    t.ff += qty;
    else if (txt.includes('sauce') && txt.includes('spaghetti'))   t.sauce   += qty;
    else if (txt.includes('pizza-ghetti') || (txt.includes('pizza') && !txt.includes('fusilli') && !txt.includes('9.00'))) t.pizza += qty;
    else if (txt.includes('poke'))    t.poke    += qty;
    else if (txt.includes('salade'))  t.salade  += qty;
    else if (txt.includes('potage'))  t.potage  += qty;
    else if (txt.includes('quiche'))  t.quiche  += qty;
    else if (txt.includes('baguette')) t.baguette += qty;
    else if (txt.includes('muffin'))  t.muffin  += qty;
  });

  return t;
}

function parseSubs(subs) {
  const total = {ti:0,tf:0,si:0,sf:0,pi:0,pf:0,fi:0,ff:0,sauce:0,pizza:0,poke:0,salade:0,potage:0,quiche:0,baguette:0,muffin:0};
  subs.forEach(sub => { const t = parseSub(sub); Object.keys(total).forEach(k => total[k] += t[k]); });
  return total;
}

function renderDashboard(subs) {
  const t = parseSubs(subs);
  const totalPortions = Object.keys(PRICES).reduce((s,k) => s + (t[k]||0), 0);
  const totalRev = Object.keys(PRICES).reduce((s,k) => s + (t[k]||0) * PRICES[k], 0);
  const maxVal = Math.max(...PLATS_DEF.map(p => p.items.reduce((s,i) => s + (t[i.k]||0), 0)), 1);

  let platsHTML = '';
  PLATS_DEF.forEach(p => {
    const total = p.items.reduce((s,i) => s + (t[i.k]||0), 0);
    const pct = Math.round((total / maxVal) * 100);
    let rows = '';
    if (p.items.length > 1) p.items.forEach(i => {
      rows += `<div class="plat-row"><span>${i.l}</span><span class="plat-count">${t[i.k]||0}</span></div>`;
    });
    platsHTML += `<div class="plat-card">
      <div class="plat-name">${p.label}</div>
      ${rows}
      <div class="plat-total-row"><span>Total</span><span>${total}</span></div>
      <div class="plat-bar-bg"><div class="plat-bar" style="width:${pct}%"></div></div>
    </div>`;
  });

  document.getElementById('main-content').innerHTML = `
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">Commandes</div><div class="stat-value">${subs.length}</div><div class="stat-sub">clients</div></div>
      <div class="stat-card"><div class="stat-label">Portions</div><div class="stat-value">${totalPortions}</div><div class="stat-sub">items commandés</div></div>
      <div class="stat-card"><div class="stat-label">Revenus estimés</div><div class="stat-value">${totalRev.toFixed(0)} $</div><div class="stat-sub">avant taxes</div></div>
    </div>
    <div class="section-title">Résumé par plat</div>
    <div class="plats-grid">${platsHTML}</div>
    <div class="last-update">Dernière mise à jour : ${new Date().toLocaleString('fr-CA')}</div>`;
}

function getField(answers, keywords) {
  const found = Object.values(answers).find(a => keywords.some(k => (a.text||a.name||'').toLowerCase().includes(k)));
  if (!found) return '';
  const ans = found.answer;
  if (typeof ans === 'object' && ans !== null) return Object.values(ans).filter(Boolean).join(' ');
  return ans || '';
}

function downloadExcel() {
  if (!allSubmissions.length) return;
  const t = parseSubs(allSubmissions);
  const wb = XLSX.utils.book_new();
  const rows = [
    [' ','Prénom','Nom','Tournedos Ind','Tournedos Fam','Sauté Ind','Sauté Fam','Porc Ind','Porc Fam','Fusilli Ind','Fusilli Fam','Sauce','Pizza','Poke','Salade','Potage','Quiche','Baguette','Muffin','Lieux','Total $'],
    ['TOTAL','','',t.ti,t.tf,t.si,t.sf,t.pi,t.pf,t.fi,t.ff,t.sauce,t.pizza,t.poke,t.salade,t.potage,t.quiche,t.baguette,t.muffin,'',''],
  ];
  allSubmissions.forEach(sub => {
    const ans = sub.answers || {};
    const prenom = getField(ans, ['prénom','prenom','first']);
    const nom = getField(ans, ['nom de famille','last','surname']);
    const lieu = getField(ans, ['lieu','récupération','recuperation']);
    const st = parseSub(sub);
    const total = Object.keys(PRICES).reduce((s,k) => s + (st[k]||0) * PRICES[k], 0);
    rows.push([sub.created_at, prenom, nom,
      st.ti||'',st.tf||'',st.si||'',st.sf||'',st.pi||'',st.pf||'',
      st.fi||'',st.ff||'',st.sauce||'',st.pizza||'',st.poke||'',
      st.salade||'',st.potage||'',st.quiche||'',st.baguette||'',st.muffin||'',
      lieu, total.toFixed(2)]);
  });
  const ws = XLSX.utils.aoa_to_sheet(rows);
  ws['!cols'] = Array(21).fill({wch:14});
  XLSX.utils.book_append_sheet(wb, ws, 'COMMANDE');
  XLSX.utils.writeFile(wb, `commandes_${new Date().toISOString().slice(0,10)}.xlsx`);
}
</script>
</body>
</html>
